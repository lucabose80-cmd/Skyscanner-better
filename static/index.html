<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skyscanner Better - Smart Flight Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=2">
</head>
<body>
    <div class="background-animation"></div>
    
    <div class="container">
        <header>
            <h1>✈️ Skyscanner <span class="highlight">Better</span></h1>
            <p>Finde die besten Flugtage ohne ewig zu suchen.</p>
        </header>

        <main>
            <section class="search-box glass">
                <form id="search-form">
                    
                    <div style="display:flex; gap:1rem;">
                        <div class="form-group" style="flex:1">
                            <label for="earliest_start">Frühester Abflug</label>
                            <input type="date" id="earliest_start" required>
                        </div>
                        <div class="form-group" style="flex:1">
                            <label for="latest_return">Spätester Rückflug / Ende</label>
                            <input type="date" id="latest_return" required>
                        </div>
                    </div>

                    <div class="form-group" style="position: relative;">
                        <label for="start_airport">Startflughafen</label>
                        <input type="text" id="start_airport" placeholder="z.B. FRA" autocomplete="off" required>
                        <div id="start-suggestions" class="suggestions-box hidden"></div>
                    </div>

                    <div id="destinations-container">
                        <!-- Zwischenziele werden hier per JS eingefügt -->
                    </div>

                    <button type="button" id="add-dest-btn" class="outline-btn">+ Weiteres Ziel hinzufügen</button>

                    <div class="form-group" style="position: relative; margin-top: 1rem;">
                        <label for="end_airport">Endflughafen (Rückflug nach)</label>
                        <input type="text" id="end_airport" placeholder="z.B. FRA (leer lassen für One-Way)" autocomplete="off">
                        <div id="end-suggestions" class="suggestions-box hidden"></div>
                    </div>

                    <button type="submit" class="submit-btn" style="margin-top: 1.5rem;">Mögliche Kombinationen berechnen</button>
                </form>
            </section>

            <section id="combo-view" class="hidden glass" style="padding: 1.5rem; margin-top: 1rem;">
                <h2>📅 Wähle deine Reise-Tage</h2>
                <p style="margin-bottom: 1rem; color: #cbd5e1;">Wähle bis zu 10 Datums-Kombinationen aus, die wir für dich bei Google Flights prüfen sollen.</p>
                <div id="combo-list">
                    <!-- Combos will be injected here -->
                </div>
                <button id="fetch-flights-btn" class="submit-btn" style="margin-top: 1rem;" disabled>Preise für Auswahl prüfen (<span id="combo-count">0</span>/10)</button>
            </section>

            <div id="loader" class="hidden">
                <div class="spinner"></div>
                <p>Kombiniere und suche nach besten Flügen... (Das kann kurz dauern)</p>
            </div>

            <section id="results" class="results-container">
                <!-- Results will be injected here -->
            </section>
        </main>
    </div>

    <script src="app.js?v=2"></script>
</body>
</html>
