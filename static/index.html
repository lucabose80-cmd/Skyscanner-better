<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Urlaubs-Flug-Suche</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>✈️ SkyFinder</h1>
            <p>Finde die besten Flüge ohne ewig zu suchen.</p>
        </header>

        <main>
            <section class="search-box glass">
                <form id="search-form">
                    <div class="form-group">
                        <label for="origin">Von (IATA, z.B. FRA)</label>
                        <input type="text" id="origin" name="origin" placeholder="FRA" required>
                    </div>
                    <div class="form-group">
                        <label for="destination">Nach (IATA, z.B. JFK)</label>
                        <input type="text" id="destination" name="destination" placeholder="JFK" required>
                    </div>
                    <div class="form-group">
                        <label for="date_from">Hinflug Datum</label>
                        <input type="date" id="date_from" name="date_from" required>
                    </div>
                    
                    <div class="checkbox-group">
                        <input type="checkbox" id="is_roundtrip" name="is_roundtrip">
                        <label for="is_roundtrip">Hin- und Rückflug</label>
                    </div>

                    <div id="return-dates" class="hidden">
                        <div class="form-group">
                            <label for="return_from">Rückflug Datum</label>
                            <input type="date" id="return_from" name="return_from">
                        </div>
                    </div>

                    <button type="submit" class="primary-btn">Flüge suchen</button>
                </form>
            </section>

            <section class="results-container">
                <div id="loader" class="hidden">
                    <div class="spinner"></div>
                    <p>Suche die günstigsten Flüge...</p>
                </div>
                <div id="results" class="results-grid">
                    <!-- Results will be injected here -->
                </div>
            </section>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
