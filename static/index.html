<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skyscanner Datums-Rechner</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=3">
</head>
<body>
    <div class="container">
        <header>
            <h1>
                <svg viewBox="0 0 24 24"><path d="M19.46 7.42l-4.24-2.83L11.5 1l-1.42.71 1.42 4.24-4.24 2.83-2.83-1.42L3 8.08l4.24 2.83L3 15.15 4.41 16.57l4.24-4.24 2.83 4.24.71 1.42 1.41-4.24 2.83-4.24 4.24-1.42.71-1.41-1.42-2.09zM21 17h-2v-2h-2v2h-2v2h2v2h2v-2h2v-2z"/></svg>
                Skyscanner <span style="color:var(--text-color);">Datums-Rechner</span>
            </h1>
            <p>Finde mathematisch die besten Flugtage für deinen Gabelflug.</p>
        </header>

        <main>
            <section class="search-box">
                <form id="search-form">
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label for="earliest_start">Frühester Abflug</label>
                            <input type="date" id="earliest_start" required>
                        </div>
                        <div class="form-group">
                            <label for="latest_return">Spätester Rückflug / Ende</label>
                            <input type="date" id="latest_return" required>
                        </div>
                    </div>

                    <div class="form-group" style="margin-bottom: 1rem;">
                        <label for="start_airport">Startflughafen</label>
                        <input type="text" id="start_airport" placeholder="z.B. Frankfurt" autocomplete="off" required>
                        <div id="start-suggestions" class="suggestions-box hidden"></div>
                    </div>

                    <div id="destinations-container">
                        <!-- Zwischenziele werden hier per JS eingefügt -->
                    </div>

                    <button type="button" id="add-dest-btn" class="outline-btn">+ Weiteres Ziel hinzufügen</button>

                    <div class="form-group" style="margin-top: 1rem;">
                        <label for="end_airport">Endflughafen (Rückflug nach)</label>
                        <input type="text" id="end_airport" placeholder="z.B. Frankfurt (leer lassen für One-Way)" autocomplete="off">
                        <div id="end-suggestions" class="suggestions-box hidden"></div>
                    </div>

                    <button type="submit" class="submit-btn" style="margin-top: 1.5rem;">
                        Beste Datums-Kombinationen berechnen
                    </button>
                </form>
            </section>

            <div id="loader" class="hidden">
                <div class="spinner"></div>
                <p>Kombiniere Millionen von Tagen...</p>
            </div>

            <section id="results" class="results-container">
                <!-- Results will be injected here -->
            </section>
        </main>
    </div>

    <script src="app.js?v=3"></script>
</body>
</html>
